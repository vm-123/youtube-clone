<!DOCTYPE html>
<html>
    <head>
        <title>Buttons Practice</title>
        <style>
    .subscribe-button {
        background-color:rgb(200, 0, 0 );
        color:white;
        border:none;
        padding-top:10px;
        padding-bottom:10px;
        padding-left:16px;
        padding-right:16px;
        border-radius:2px;
        cursor:pointer;
        margin-right:8px;
        transition:opacity 0.15s;
        vertical-align:top;
    }
    .subscribe-button:hover{
        opacity:0.8;
    }
    .subscribe-button:active{
        opacity:0.5;
    }
    .join-button{
        background-color:white;
        border-color:rgb(20, 137, 215);
        border-style:solid;
        border-width:1px;
        color:rgb(41, 118, 211);
        padding-left:16px;
        padding-top:9px;
        padding-bottom:9px;
        padding-right:16px;
        border-radius:2px;
        cursor:pointer;
        margin-right:8px;
        transition:background-color 0.25s,
        color 0.25s;
    } 
    .join-button:hover{
        background-color:rgb(41, 118, 211);
        color:white;
    }
    .join-button:active{
        opacity:0.7;
    }
    .tweet-button{
        background-color:rgb(2, 158, 255);
        color:white;
        border-radius:18px;
        height:36px;
        width:75px;
        border:none;
        font-weight:bold;
        font-size:15px;
        cursor:pointer;
        transition:box-shadow 0.2s;
        vertical-align: top;
    }
    .tweet-button:hover{
        box-shadow: 5px 5px 10px rgb(0, 0, 0,0.2); 
    }
     

</style>
</head>
    <body>
        <button class="join-button">
    JOIN
</button>
<button class="tweet-button">
    Tweet
</button>
<button class="subscribe-button">
    SUBSCRIBE
</button>
</body>
</html>
